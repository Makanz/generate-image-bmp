<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <h1>Dashboard</h1>
            <span class="timestamp" id="timestamp"></span>
        </header>

        <div class="grid">
            <div class="card" id="weather-card">
                <h2>Väder</h2>
                <div class="weather-content">
                    <div class="weather-main">
                        <span class="weather-temp" id="weather-temp">--°C</span>
                        <span class="weather-desc" id="weather-desc">Laddar...</span>
                    </div>
                    <div class="weather-details">
                        <span id="weather-location"></span>
                        <span id="weather-precip"></span>
                    </div>
                </div>
            </div>

            <div class="card" id="lunch-card">
                <h2>Lunch</h2>
                <div class="lunch-content" id="lunch-content">
                    <p class="loading">Laddar...</p>
                </div>
            </div>

            <div class="card wide" id="calendar-card">
                <h2>Kalender</h2>
                <div class="calendar-content" id="calendar-content">
                    <p class="loading">Laddar...</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
